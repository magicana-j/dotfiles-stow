# AIコーディング最適化: 高速検索のための最小限設定
unqualified-search-registries = ["docker.io"]

# Docker Hub (最も一般的なRustイメージの場所)
[[registry]]
prefix = "docker.io"
location = "docker.io"
insecure = false
blocked = false

# GitHub Container Registry (AI開発ツール等で使用)
[[registry]]
prefix = "ghcr.io" 
location = "ghcr.io"
insecure = false
blocked = false
